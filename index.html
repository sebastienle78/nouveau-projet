<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Album Photo Sombre</title>
    <style>
        /* Le style "Sombre" (CSS) */
        body {
            background-color: #121212; /* Noir profond */
            color: #e0e0e0;           /* Texte gris clair */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        .menu {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #505050;
            border-color: #888;
        }

        .galerie {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Cache les photos au départ */
        }
    </style>
</head>
<body>

    <h1>Mon Album Photo</h1>

    <div class="menu">
        <button onclick="afficher('img1')">Photo 1</button>
        <button onclick="afficher('img2')">Photo 2</button>
        <button onclick="afficher('img3')">Photo 3</button> 
        <button onclick="afficher('img4')">Photo 4</button>
        <button onclick="afficher('img5')">Photo 5</button>
        <button onclick="afficher('img6')">Photo 6</button>
        <button onclick="afficher('img7')">Photo 7</button>
        <button onclick="afficher('img8')">Photo 8</button>
        <button onclick="afficher('img9')">Photo 9</button>
        <button onclick="afficher('img10')">Photo 10</button>
        <button onclick="afficher('img11')">Photo 11</button>
        <button onclick="afficher('img12')">Photo 12</button>
        <button onclick="afficher('img13')">Photo 13</button>
        <button onclick="afficher('img14')">Photo 14</button>
        <button onclick="afficher('img15')">Photo 15</button>
        <button onclick="afficher('img16')">Photo 16</button>
        <button onclick="afficher('img17')">Photo 17</button>
        <button onclick="afficher('img18')">Photo 18</button>
        <button onclick="toutAfficher()">Tout voir</button>
    </div>

    <div class="galerie">
        <img id="img1" src="Photo1.jpg" alt="Photo 1">
        <img id="img2" src="Photo2.jpg" alt="Photo 2">
        <img id="img3" src="Photo3.jpg" alt="Photo 3">
        <img id="img4" src="Photo4.jpg" alt="Photo 4">
        <img id="img5" src="Photo5.jpg" alt="Photo 5">
        <img id="img6" src="Photo6.jpg" alt="Photo 6">
        <img id="img7" src="Photo7.jpg" alt="Photo 7">
        <img id="img8" src="Photo8.jpg" alt="Photo 8">
        <img id="img9" src="Photo9.jpg" alt="Photo 9">
        <img id="img10" src="Photo10.jpg" alt="Photo 10">
        <img id="img11" src="Photo11.jpg" alt="Photo 12">
        <img id="img12" src="Photo12.jpg" alt="Photo 12">
        <img id="img13" src="Photo13.jpg" alt="Photo 13">
        <img id="img14" src="Photo14.jpg" alt="Photo 14">
        <img id="img15" src="Photo15.jpg" alt="Photo 15">
        <img id="img16" src="Photo16.jpg" alt="Photo 16">
        <img id="img17" src="Photo17.jpg" alt="Photo 17">
        <img id="img18" src="Photo18.jpg" alt="Photo 18">
    </div>

    <script>
        // La petite logique pour afficher les photos
        function afficher(id) {
            // Cache toutes les images d'abord
            document.querySelectorAll('img').forEach(img => img.style.display = 'none');
            // Affiche celle demandée
            document.getElementById(id).style.display = 'block';
        }

        function toutAfficher() {
            document.querySelectorAll('img').forEach(img => img.style.display = 'block');
        }
    </script>

</body>
</html>
